
services:
  gitea:
    image: 'gitea/gitea:1.25.5'
#   user: "${USER_UID}:${USER_GID}"  # match your host UID:GID

    hostname: "${GITEA}"
    container_name: ${GITEA}
#   command: ["gitea", "web", "--config", "/app.ini"]
    environment:
      - USER=git
      - USER_UID=$USER_UID
      - USER_GID=$USER_GID
      - GITEA__server__DOMAIN=${GITEA}
      - GITEA__server__SSH_DOMAIN=${GITEA}
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__SSH_LISTEN_PORT=22
      - GITEA__server__SSH_PORT=8022
      - GITEA__server__ROOT_URL=http://${GITEA}:3000
      - ONLY_ALLOW_PUSH_IF_GITEA_ENVIRONMENT_SET=false
      - GITEA__security__INSTALL_LOCK=true   # required - marks gitea as installed
      - GITEA_ADMIN_USERNAME=lp              # optional - creates first admin
      - GITEA_ADMIN_PASSWORD=geheim
      - GITEA_ADMIN_EMAIL=test@lp.com
    restart: unless-stopped
    ports:
      - '8022:22'
      - '3000:3000'
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://${GITEA}:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
#     - ./gitea.app.ini:/app.ini
      - ./gitea-data:/data
